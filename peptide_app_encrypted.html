<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptides">
  <title>Peptide Reference</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0f1a;--bg2:#111827;--bg3:#1a2236;--bg4:#212d42;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);--text:#e8edf5;--text2:#8b9ab5;--text3:#4d5f7a;--green:#5DCAA5;--red:#D85A30;--amber:#EF9F27}
    html{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden}
    body::before{content:'';position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 60% 50% at 20% 30%,rgba(93,202,165,0.06) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 70%,rgba(55,138,221,0.05) 0%,transparent 70%),radial-gradient(ellipse 40% 60% at 60% 20%,rgba(127,119,221,0.04) 0%,transparent 70%);animation:bgPulse 8s ease-in-out infinite alternate}
    @keyframes bgPulse{from{opacity:.6}to{opacity:1}}
    #lock-screen{position:relative;z-index:1;width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:36px 28px 32px;box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.03);animation:cardIn .4s cubic-bezier(0.32,0.72,0,1) both}
    @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(0.97)}to{opacity:1;transform:none}}
    .lock-icon-wrap{width:64px;height:64px;margin:0 auto 20px;background:rgba(93,202,165,0.1);border:1px solid rgba(93,202,165,0.25);border-radius:18px;display:flex;align-items:center;justify-content:center}
    .lock-icon-wrap svg{color:var(--green)}
    .lock-title{font-size:20px;font-weight:700;letter-spacing:-0.02em;text-align:center;color:var(--text);margin-bottom:5px}
    .lock-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:28px;line-height:1.4}
    .pw-wrap{position:relative;margin-bottom:14px}
    .pw-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:15px;letter-spacing:0.08em;padding:13px 44px 13px 16px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none}
    .pw-input::placeholder{color:var(--text3);letter-spacing:0;font-family:'DM Sans',sans-serif;font-size:13px}
    .pw-input:focus{border-color:rgba(93,202,165,0.5);box-shadow:0 0 0 3px rgba(93,202,165,0.1)}
    .pw-input.error{border-color:rgba(216,90,48,0.6);box-shadow:0 0 0 3px rgba(216,90,48,0.1);animation:shake .35s cubic-bezier(0.36,0.07,0.19,0.97) both}
    @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-6px)}40%,60%{transform:translateX(6px)}}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);display:flex;align-items:center;padding:4px;transition:color .15s}
    .pw-toggle:hover{color:var(--text2)}
    .unlock-btn{width:100%;background:var(--green);color:#0a0f1a;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;padding:14px;cursor:pointer;transition:background .2s,transform .1s;display:flex;align-items:center;justify-content:center;gap:8px}
    .unlock-btn:hover{background:#6dd9b5}
    .unlock-btn:active{transform:scale(0.98)}
    .unlock-btn:disabled{opacity:.5;cursor:not-allowed}
    .spinner{width:16px;height:16px;border:2px solid rgba(10,15,26,.3);border-top-color:#0a0f1a;border-radius:50%;animation:spin .7s linear infinite;display:none}
    .unlock-btn.loading .spinner{display:block}
    .unlock-btn.loading .btn-label{display:none}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{margin-top:11px;font-size:12px;color:var(--red);text-align:center;min-height:18px;opacity:0;transition:opacity .2s}
    .error-msg.visible{opacity:1}
    .progress-wrap{margin-top:14px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;display:none}
    .progress-wrap.visible{display:block}
    .progress-bar{height:100%;width:0%;background:var(--green);border-radius:2px;transition:width .1s linear}
    .lock-footer{margin-top:24px;display:flex;align-items:center;justify-content:center;gap:6px;font-size:11px;color:var(--text3)}
    .lock-footer .dot{width:5px;height:5px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
  </style>
</head>
<body>
<div id="lock-screen">
  <div class="lock-icon-wrap">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <div class="lock-title">Peptide Reference</div>
  <div class="lock-sub">Enter your password to access the app</div>
  <div class="pw-wrap">
    <input class="pw-input" id="pwInput" type="password" placeholder="Password" autocomplete="current-password" spellcheck="false">
    <button class="pw-toggle" id="pwToggle" type="button" aria-label="Show/hide password">
      <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>
  <button class="unlock-btn" id="unlockBtn" type="button">
    <span class="btn-label">Unlock</span>
    <div class="spinner"></div>
  </button>
  <div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar"></div></div>
  <div class="error-msg" id="errorMsg">Incorrect password — please try again</div>
  <div class="lock-footer"><div class="dot"></div><span>AES-256-GCM &nbsp;·&nbsp; PBKDF2 · 310,000 iterations</span></div>
</div>

function b64ToUint8(b64){const bin=atob(b64);const out=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)out[i]=bin.charCodeAt(i);return out;}
const pwInput=document.getElementById('pwInput');
const unlockBtn=document.getElementById('unlockBtn');
const errorMsg=document.getElementById('errorMsg');
const progressWrap=document.getElementById('progressWrap');
const progressBar=document.getElementById('progressBar');
const pwToggle=document.getElementById('pwToggle');
const eyeIcon=document.getElementById('eyeIcon');
pwToggle.addEventListener('click',()=>{
  const h=pwInput.type==='password';
  pwInput.type=h?'text':'password';
  eyeIcon.innerHTML=h?'<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>':'<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});
function animateProgress(){
  progressWrap.classList.add('visible');
  let pct=0;
  const iv=setInterval(()=>{if(pct<85)pct+=2.5;else if(pct<95)pct+=0.4;progressBar.style.width=pct+'%';},60);
  return()=>{clearInterval(iv);progressBar.style.width='100%';setTimeout(()=>{progressWrap.classList.remove('visible');progressBar.style.width='0%';},300);};
}
async function tryUnlock(){
  const password=pwInput.value;
  if(!password){pwInput.focus();return;}
  unlockBtn.classList.add('loading');
  unlockBtn.disabled=true;
  errorMsg.classList.remove('visible');
  pwInput.classList.remove('error');
  const stopProgress=animateProgress();
  try{
    const salt=b64ToUint8(SALT_B64);
    const iv=b64ToUint8(IV_B64);
    const ct=b64ToUint8(CT_B64);
    const pwBytes=new TextEncoder().encode(password);
    const importedKey=await crypto.subtle.importKey('raw',pwBytes,{name:'PBKDF2'},false,['deriveKey']);
    const aesKey=await crypto.subtle.deriveKey(
      {name:'PBKDF2',salt,iterations:310000,hash:'SHA-256'},
      importedKey,{name:'AES-GCM',length:256},false,['decrypt']
    );
    const plainBuf=await crypto.subtle.decrypt({name:'AES-GCM',iv},aesKey,ct);
    stopProgress();
    const html=new TextDecoder().decode(plainBuf);
    document.open();document.write(html);document.close();
  }catch(err){
    stopProgress();
    unlockBtn.classList.remove('loading');
    unlockBtn.disabled=false;
    pwInput.classList.add('error');
    errorMsg.classList.add('visible');
    pwInput.select();
  }
}
unlockBtn.addEventListener('click',tryUnlock);
pwInput.addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock();});
pwInput.focus();
</script>
