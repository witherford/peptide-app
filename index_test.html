<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Peptides">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>Witherrs Peptide app - Test version</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0a0f1a;color:#e8edf5;font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    body{display:flex;align-items:center;justify-content:center;min-height:100dvh;padding:20px}
    .lock-card{
      width:100%;max-width:360px;
      background:#111827;border:1px solid rgba(255,255,255,0.07);
      border-radius:16px;padding:36px 28px;
      display:flex;flex-direction:column;align-items:center;gap:20px;
    }
    .lock-icon{
      width:52px;height:52px;border-radius:14px;
      background:rgba(93,202,165,0.12);border:1px solid rgba(93,202,165,0.25);
      display:flex;align-items:center;justify-content:center;
    }
    .lock-icon svg{color:#5DCAA5}
    h1{font-size:18px;font-weight:700;letter-spacing:-0.02em;text-align:center}
    p{font-size:13px;color:#8b9ab5;text-align:center;line-height:1.5}
    .input-wrap{width:100%;position:relative}
    input[type=password],input[type=text]{
      width:100%;background:#1a2236;border:1px solid rgba(255,255,255,0.1);
      border-radius:8px;padding:11px 44px 11px 14px;
      font-size:14px;color:#e8edf5;outline:none;
      transition:border-color .2s;font-family:inherit;
    }
    input:focus{border-color:#5DCAA5}
    .toggle-pw{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;cursor:pointer;color:#4d5f7a;
      display:flex;align-items:center;padding:2px;
    }
    .toggle-pw:hover{color:#8b9ab5}
    button.unlock{
      width:100%;background:#5DCAA5;color:#052e21;
      border:none;border-radius:8px;padding:12px;
      font-size:14px;font-weight:700;cursor:pointer;
      transition:filter .15s;font-family:inherit;
    }
    button.unlock:hover{filter:brightness(1.08)}
    button.unlock:disabled{opacity:0.5;cursor:not-allowed}
    .error{
      font-size:12px;color:#D85A30;text-align:center;
      background:rgba(216,90,48,0.1);border:1px solid rgba(216,90,48,0.25);
      border-radius:6px;padding:8px 12px;width:100%;display:none;
    }
    .spinner{
      width:16px;height:16px;border:2px solid rgba(5,46,33,0.3);
      border-top-color:#052e21;border-radius:50%;
      animation:spin .7s linear infinite;display:inline-block;
      vertical-align:middle;margin-right:6px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="lock-card">
  <div class="lock-icon">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
      <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h1>Witherrs Peptide app - Test version</h1>
  <p>This app is password protected.<br>Enter your access code to continue.</p>
  <div class="input-wrap">
    <input type="password" id="pw" placeholder="Enter password" autocomplete="current-password" autofocus>
    <button class="toggle-pw" id="togglePw" tabindex="-1" title="Show/hide password">
      <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>
  <div class="error" id="err">Incorrect password — please try again.</div>
  <button class="unlock" id="unlockBtn">Unlock</button>
</div>

async function decrypt(b64, password) {
  const enc = new TextEncoder();
  const dec = new TextDecoder();
  const combined = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const salt       = combined.slice(0, 16);
  const iv         = combined.slice(16, 28);
  const ciphertext = combined.slice(28);
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 250000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );
  const plaintext = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
  return dec.decode(plaintext);
}

const pwInput   = document.getElementById('pw');
const unlockBtn = document.getElementById('unlockBtn');
const errEl     = document.getElementById('err');
const togglePw  = document.getElementById('togglePw');
const eyeIcon   = document.getElementById('eyeIcon');

togglePw.addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  eyeIcon.innerHTML = show
    ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
    : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
});

async function attemptUnlock() {
  const password = pwInput.value;
  if (!password) { pwInput.focus(); return; }
  errEl.style.display = 'none';
  unlockBtn.disabled = true;
  unlockBtn.innerHTML = '<span class="spinner"></span>Unlocking…';
  try {
    const html = await decrypt(ENCRYPTED, password);
    document.open();
    document.write(html);
    document.close();
  } catch {
    errEl.style.display = 'block';
    unlockBtn.disabled = false;
    unlockBtn.textContent = 'Unlock';
    pwInput.value = '';
    pwInput.focus();
  }
}

unlockBtn.addEventListener('click', attemptUnlock);
pwInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptUnlock(); });
</script>
